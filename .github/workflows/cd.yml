# .github/workflows/cd.yml
name: CD - Deploy Model to SageMaker

on:
  workflow_run:
    workflows: ["CI - Train and Upload Model"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      # Get the latest bucket CI just created (sorted by creation date)
      - name: Get latest S3 bucket name from AWS
        run: |
          BUCKET=$(aws s3api list-buckets \
            --query "sort_by(Buckets, &CreationDate)[-1:][?starts_with(Name, 'my-ml-models-')].Name | [0]" \
            --output text)
          echo "S3_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "Found bucket: $BUCKET"

      - name: Terraform Init
        working-directory: terraform/cd
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/cd
        run: terraform apply -auto-approve -var="s3_bucket=${{ env.S3_BUCKET }}" -var="sagemaker_role_arn=${{ secrets.SAGEMAKER_ROLE_ARN }}"