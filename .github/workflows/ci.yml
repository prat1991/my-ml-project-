# .github/workflows/ci.yml
name: CI - Train and Upload Model

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code
      - uses: actions/checkout@v4

      # 2. Inject AWS credentials from GitHub Secrets
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Install Terraform
      - uses: hashicorp/setup-terraform@v3

      # 4. Run terraform/ci/main.tf  (creates S3 + trains model)
      - name: Terraform Init
        working-directory: terraform/ci
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/ci
        run: terraform apply -auto-approve

      # 5. Save the bucket name for the CD step
      - name: Save S3 bucket name
        working-directory: terraform/ci
        run: echo "S3_BUCKET=$(terraform output -raw s3_bucket)" >> $GITHUB_ENV